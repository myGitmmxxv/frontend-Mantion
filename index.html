<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Rental - Room Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="hero-section">
        <div class="hero-content">
            <h1 id="hero-title">ค้นพบที่พักที่ตอบโจทย์ไลฟ์สไตล์คุณ</h1>
            <p id="hero-desc">สัมผัสประสบการณ์การพักผ่อนที่เหนือระดับ ด้วยห้องพักดีไซน์ Minimalist</p>
            <a href="#dashboard" class="btn-primary">ดูห้องพักทั้งหมด</a>
        </div>
    </section>

    <section id="dashboard" class="dashboard">
        <h2>สรุปสถานะห้องว่าง</h2>
        <div id="stats-container" class="stats-grid">
            </div>
    </section>

    <div id="rooms" class="room-grid-container">
        </div>

    <section id="booking-section" class="booking-section">
        <div class="booking-container">
            <h2>จองห้องพักของคุณ</h2>
            <p>กรอกข้อมูลสั้นๆ เพื่อให้เจ้าหน้าที่ติดต่อกลับ</p>
            
            <form id="booking-form">
                <div class="form-group">
                    <label for="selected-room-name">ห้องที่เลือก</label>
                    <input type="text" id="selected-room-name" readonly placeholder="โปรดเลือกห้องพักจากรายการด้านบน" style="background-color: #333; color: #fff; cursor: not-allowed;">
                    <input type="hidden" id="selected-room-id">
                </div>

                <div class="form-group">
                    <label for="name">ชื่อ-นามสกุล</label>
                    <input type="text" id="name" placeholder="ภาษาไทย หรือ ภาษาอังกฤษ" required>
                </div>
                
                <div class="form-group">
                    <label for="email">อีเมล</label>
                    <input type="email" id="email" placeholder="example@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="date">วันที่ต้องการเข้าพัก</label>
                    <input type="date" id="date" required>
                </div>
                
                <button type="submit" class="btn-submit">ยืนยันการจอง</button>
            </form>
            <div id="form-message" class="form-message"></div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
